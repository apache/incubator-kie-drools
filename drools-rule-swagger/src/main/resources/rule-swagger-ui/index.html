<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drools Rule Swagger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="topbar-title">Drools Rule Swagger</span>
      </div>
      <div class="topbar-summary" id="summary"></div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="Filter rules..." autocomplete="off">
      </div>
      <div class="sidebar-content" id="sidebarContent"></div>
    </nav>

    <main class="content" id="mainContent">
      <div class="welcome">
        <h1>Drools Rule Swagger</h1>
        <p>Browse, inspect, and test-fire your Drools rules. Select a package from the sidebar to get started.</p>
        <div class="stats-grid" id="statsGrid"></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
